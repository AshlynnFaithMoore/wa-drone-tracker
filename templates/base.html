<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% block title %}WA Drone Tracker{% endblock %}</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      background: #1e1e2e;
      color: #cdd6f4;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }
    .navbar {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      padding: 0.85rem 1.5rem;
      background: #181825;
      border-bottom: 1px solid #313244;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .navbar .brand {
      font-size: 1.1rem;
      font-weight: 700;
      color: #cdd6f4;
      text-decoration: none;
    }
    .navbar .nav-links {
      display: flex;
      gap: 1.25rem;
      margin-left: auto;
    }
    .navbar a {
      color: #a6adc8;
      text-decoration: none;
      font-size: 0.875rem;
      padding: 4px 8px;
      border-radius: 6px;
      transition: background 0.15s, color 0.15s;
    }
    .navbar a:hover  { background: #313244; color: #cdd6f4; }
    .navbar a.active { background: #313244; color: #89b4fa; font-weight: 600; }
    .page { padding: 1.5rem; }
    .card {
      background: #313244;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
    }
    select, input[type=text], input[type=range] {
      background: #45475a;
      color: #cdd6f4;
      border: 1px solid #585b70;
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 0.875rem;
      outline: none;
    }
    select:focus, input[type=text]:focus { border-color: #89b4fa; }
    .badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
    }
    .badge-minor    { background: #2a4a2e; color: #a6e3a1; }
    .badge-moderate { background: #4a3a1a; color: #fab387; }
    .badge-severe   { background: #4a1a1a; color: #f38ba8; }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid #45475a;
      border-top-color: #89b4fa;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 2rem auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #toast {
      position: fixed;
      bottom: 1.5rem; right: 1.5rem;
      background: #313244;
      color: #cdd6f4;
      border: 1px solid #45475a;
      border-radius: 10px;
      padding: 0.75rem 1.25rem;
      font-size: 0.875rem;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.25s, transform 0.25s;
      z-index: 9999;
      pointer-events: none;
    }
    #toast.show { opacity: 1; transform: translateY(0); }
  </style>

  {% block extra_head %}{% endblock %}
</head>

<body>

  <nav class="navbar">
    <a href="/" class="brand">🛸 WA Drone Tracker</a>
    <div class="nav-links">
      <a href="/"              class="{{ 'active' if request.endpoint == 'views.index' }}">📊 Dashboard</a>
      <a href="/map"           class="{{ 'active' if request.endpoint == 'views.map_view' }}">🗺 Map</a>
      <a href="/incidents"     class="{{ 'active' if request.endpoint == 'views.incidents' }}">⚠️ Incidents</a>
      <a href="/registrations" class="{{ 'active' if request.endpoint == 'views.registrations' }}">📋 Registrations</a>
    </div>
  </nav>

  <main class="page">
    {% block content %}{% endblock %}
  </main>

  <footer style="text-align:center; padding:1rem; color:#585b70; font-size:0.75rem; border-top:1px solid #313244; margin-top:2rem;">
    WA Drone Tracker &nbsp;·&nbsp;
    Data: <a href="https://opensky-network.org" target="_blank" style="color:#585b70">OpenSky Network</a>
    &amp; <a href="https://www.faa.gov" target="_blank" style="color:#585b70">FAA</a>
    &nbsp;·&nbsp; Refreshes every 60s
  </footer>

  <div id="toast"></div>

  <script>
    function showToast(msg, duration = 2500) {
      const t = document.getElementById("toast");
      t.textContent = msg;
      t.classList.add("show");
      setTimeout(() => t.classList.remove("show"), duration);
    }

    document.querySelectorAll(".nav-links a").forEach(a => {
      if (a.getAttribute("href") === window.location.pathname) {
        a.classList.add("active");
      }
    });
  </script>

  {% block extra_scripts %}{% endblock %}

</body>
</html>

# pytest.ini

# pytest configuration file.

[pytest]

# Where to look for tests.
# pytest will recursively search the tests/ directory for test_*.py files.
testpaths = tests

# Default command-line options applied to every test run:
#   -v              verbose: show each test name as it runs (not just dots)
#   --tb=short      traceback style: show a concise traceback on failure
#   --strict-markers: fail if a test uses an unregistered @pytest.mark
addopts = -v --tb=short --strict-markers

# Register custom markers to avoid warnings.
# Markers let you run subsets of tests: pytest -m unit
markers =
    unit: Pure unit tests (no database, no network)
    integration: Tests that use the database or Flask test client
    e2e: End-to-end tests that require a running browser (Selenium)
    slow: Tests that take more than a few seconds

# Minimum pytest version required
minversion = 7.0

# Tell pytest where the source root is for coverage reporting
